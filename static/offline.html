<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are Offline - Attendix</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .offline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 30px;
        }
        .offline-icon {
            font-size: 64px;
            color: #ef4444;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        .offline-card {
            max-width: 420px;
            padding: 36px;
        }
    </style>
</head>
<body>
    <div class="background-glow">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
    </div>

    <div class="app-container">
        <div class="offline-container">
            <div class="offline-card glass-card">
                <i class="fa-solid fa-wifi-slash offline-icon"></i>
                <h2>You are Currently Offline</h2>
                <p style="color: var(--text-secondary); margin: 12px 0 24px;">Internet connection is unavailable. You can still view your cached attendance records if saved previously.</p>

                <button onclick="window.location.reload()" class="btn btn-primary btn-block">
                    <i class="fa-solid fa-rotate-right"></i> Try Reconnecting
                </button>
            </div>
        </div>
    </div>
</body>
</html>
